services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
      - storage_data:/app/backend/storage

  worker:
    volumes:
      - ./backend:/app/backend
      - storage_data:/app/backend/storage

volumes:
  frontend_node_modules:
